<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <!-- form -->
    <form action="" method="post" enctype="multipart/form-data">

        <!-- text -->
        <label for="username">username:</label>
        <input type="text" id="username" minlength="6" maxlength="10" placeholder="username">
        <br>

        <!-- password -->
        <label for="password">password:</label>
        <input type="password" id="password" minlength="6" maxlength="10" placeholder="password">
        <br>

        <!-- email -->
        <label for="email">email:</label>
        <input type="email" id="email" placeholder="xb@gmail.com">
        <br>

        <!-- phone number -->
        <label for="phone">phone:</label>
        <input type="number" id="phone" minlength="8" maxlength="13" placeholder="+123-456-7890">
        <br>

        <!-- date -->
        <label for="bday">birth day:</label>
        <input type="date" id="bday" minlength="6" maxlength="10" placeholder="1234567890">
        <br>

        <!-- number -->
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" max="50" value="1">
        <br>

        <!-- radio buttons -->
        <label for="title">Title</label>
        <br>
        <label for="Mr">Mr</label>
        <input type="radio" id="Mr" value="Mr" name="title">
        <label for="Ms">Ms</label>
        <input type="radio" id="Ms" value="Ms" name="title">
        <label for="Dr">Dr</label>
        <input type="radio" id="Dr" value="Dr" name="title">
        <br>

        <!-- select tag -->
        <label for="payment">payment</label>
        <select name="payment" id="payment" value="paypal">
            <option value="cash">cash</option>
            <option value="card">card</option>
            <option value="paypal">paypal</option>
            <option value="credit card">credit card</option>
        </select>
        <br>

        <!-- checkbox -->
        <label for="terms and conditions">Terms and conditions</label>
        <input type="checkbox" id="terms and conditions" required>
        <br>

        <!-- comment -->
        <label for="comment">comment</label>
        <textarea name="comment" id="comment" cols="20" rows="3"></textarea>
        <br>

        <!-- file -->
        <label for="file">file:</label>
        <input type="file" id="file" name="file" accept="image/png , image/jpg">
        <br>

        <input type="reset">
        <input type="submit">
    </form>
</body>

</html>
